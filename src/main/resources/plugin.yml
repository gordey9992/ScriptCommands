name: ScriptCommands
version: 1.0.0
main: me.gordey9992.scriptcommands.ScriptCommands
api-version: "1.21"
authors: [gordey9992, DeepSeek]
description: Динамические команды из Java скриптов для Purpur 1.21.11
website: https://github.com/gordey9992/ScriptCommands

# Команды плагина
commands:
  scriptreload:
    description: Перезагрузить все скрипты
    usage: /scriptreload
    permission: scriptcommands.reload
    aliases:
      - sr
      - scriptsreload
      - sreload

# Права доступа
permissions:
  scriptcommands.reload:
    description: Право на перезагрузку скриптов
    default: op
  
  scriptcommands.use.*:
    description: Право на использование всех динамических команд
    default: true
  
  scriptcommands.admin:
    description: Административные права плагина
    default: op
    children:
      scriptcommands.reload: true

# Лоадер для загрузки плагина (опционально, если нужен)
# load: STARTUP
