name: ScriptCommands
version: 1.0.0
main: me.gordey9992.scriptcommands.ScriptCommands
api-version: "1.21"
authors: [gordey9992, DeepSeek]
description: Динамические команды из Java скриптов для Purpur 1.21.11
website: https://github.com/gordey9992/ScriptCommands

commands:
  scriptreload:
    description: Перезагрузить все скрипты
    usage: /scriptreload
    permission: scriptcommands.reload
    aliases: [sr, scriptsreload, sreload]
  
  screload:
    description: Перезагрузить плагин, конфиги и скрипты
    usage: /screload
    permission: scriptcommands.reload-all
    aliases: [scr]
  
  scupdateyes:
    description: Установить новую версию плагина
    usage: /scupdateyes
    permission: scriptcommands.update
  
  scupdateno:
    description: Пропустить обновление
    usage: /scupdateno
    permission: scriptcommands.update

permissions:
  scriptcommands.reload:
    description: Право на перезагрузку скриптов
    default: op
  scriptcommands.reload-all:
    description: Право на полную перезагрузку
    default: op
  scriptcommands.update:
    description: Право на обновление плагина
    default: op
  scriptcommands.use.*:
    description: Право на использование всех динамических команд
    default: true
  scriptcommands.admin:
    description: Административные права плагина
    default: op
    children:
      scriptcommands.reload: true
      scriptcommands.reload-all: true
      scriptcommands.update: true
